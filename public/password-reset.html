<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Şifre Sıfırla | Yeni Asya Dijital</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f2ec;
        --ink: #1c1c1c;
        --muted: #5f5a54;
        --card: #ffffff;
        --accent: #c1452f;
        --border: #e6ddd2;
        --soft: #fff6ee;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(1200px 600px at 20% -10%, #ffe8d1 0%, rgba(255, 232, 209, 0) 60%), var(--bg);
        color: var(--ink);
        line-height: 1.5;
      }
      main {
        max-width: 560px;
        margin: 48px auto 72px;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.05);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.9rem;
      }
      p {
        margin: 0 0 14px;
      }
      .muted {
        color: var(--muted);
      }
      label {
        display: block;
        margin: 14px 0 8px;
        font-weight: 700;
      }
      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 15px;
        background: #fff;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 700;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        margin-top: 18px;
      }
      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }
      .note,
      .result,
      .error {
        border-radius: 14px;
        padding: 14px 16px;
        margin-top: 16px;
      }
      .note {
        background: var(--soft);
        border: 1px solid #efc7b1;
      }
      .result {
        background: #eef9f0;
        border: 1px solid #b7dfc0;
      }
      .error {
        background: #fff0f0;
        border: 1px solid #efc0c0;
      }
      .hidden {
        display: none;
      }
      @media (max-width: 600px) {
        main {
          margin-top: 28px;
        }
        .card {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1 id="title">Şifremi Unuttum</h1>
        <p class="muted" id="subtitle">
          Kayıtlı e-posta adresinizi girin. Size tek kullanımlık bir sıfırlama bağlantısı gönderelim.
        </p>

        <form id="request-form" novalidate>
          <label for="email">E-posta</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="ornek@email.com" />
          <button id="request-button" type="submit">Sıfırlama Maili Gönder</button>
        </form>

        <form id="reset-form" class="hidden" novalidate>
          <label for="password">Yeni Şifre</label>
          <input id="password" name="password" type="password" autocomplete="new-password" />

          <label for="password-confirm">Yeni Şifre (Tekrar)</label>
          <input id="password-confirm" name="password-confirm" type="password" autocomplete="new-password" />

          <div class="note">
            Şifreniz en az 8 karakter olmalı; büyük harf, küçük harf ve rakam içermelidir.
          </div>
          <button id="reset-button" type="submit">Şifreyi Güncelle</button>
        </form>

        <div id="result" class="result hidden"></div>
        <div id="error" class="error hidden"></div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const token = (params.get("token") || "").trim();
      const email = (params.get("email") || "").trim();

      const title = document.getElementById("title");
      const subtitle = document.getElementById("subtitle");
      const requestForm = document.getElementById("request-form");
      const resetForm = document.getElementById("reset-form");
      const requestButton = document.getElementById("request-button");
      const resetButton = document.getElementById("reset-button");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const passwordConfirmInput = document.getElementById("password-confirm");
      const resultBox = document.getElementById("result");
      const errorBox = document.getElementById("error");

      function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.remove("hidden");
      }

      function clearError() {
        errorBox.textContent = "";
        errorBox.classList.add("hidden");
      }

      function showResult(message) {
        resultBox.textContent = message;
        resultBox.classList.remove("hidden");
      }

      function setLoading(button, loading) {
        button.disabled = loading;
      }

      function isStrongPassword(value) {
        return (
          value.length >= 8 &&
          /[A-Z]/.test(value) &&
          /[a-z]/.test(value) &&
          /[0-9]/.test(value)
        );
      }

      if (email) {
        emailInput.value = email;
      }

      if (token) {
        title.textContent = "Yeni Şifre Belirle";
        subtitle.textContent = email
          ? `${email} hesabı için yeni şifrenizi belirleyin.`
          : "Bağlantı doğrulandıktan sonra yeni şifreniz kaydedilecektir.";
        requestForm.classList.add("hidden");
        resetForm.classList.remove("hidden");
      }

      requestForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearError();
        resultBox.classList.add("hidden");

        const emailValue = emailInput.value.trim();
        if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(emailValue)) {
          showError("Geçerli bir e-posta girin.");
          return;
        }

        try {
          setLoading(requestButton, true);
          const response = await fetch("/auth/password-reset/request", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ email: emailValue }),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(payload.error || payload.message || "Şifre sıfırlama isteği gönderilemedi.");
          }
          showResult(
            payload.message ||
              "Bu e-posta adresi kayıtlıysa şifre sıfırlama bağlantısı gönderildi."
          );
          requestForm.classList.add("hidden");
        } catch (error) {
          showError(error.message || "Şifre sıfırlama isteği gönderilemedi.");
        } finally {
          setLoading(requestButton, false);
        }
      });

      resetForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearError();
        resultBox.classList.add("hidden");

        const password = passwordInput.value.trim();
        const confirmPassword = passwordConfirmInput.value.trim();

        if (!isStrongPassword(password)) {
          showError("Şifre en az 8 karakter olmalı; büyük harf, küçük harf ve rakam içermelidir.");
          return;
        }
        if (password !== confirmPassword) {
          showError("Şifreler eşleşmiyor.");
          return;
        }

        try {
          setLoading(resetButton, true);
          const response = await fetch("/auth/password-reset/confirm", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ token, password }),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(payload.error || payload.message || "Şifre güncellenemedi.");
          }
          showResult(payload.message || "Şifre başarıyla güncellendi.");
          resetForm.classList.add("hidden");
          subtitle.textContent = "Aynı bağlantı tekrar kullanılamaz.";
        } catch (error) {
          showError(error.message || "Şifre güncellenemedi.");
        } finally {
          setLoading(resetButton, false);
        }
      });
    </script>
  </body>
</html>
